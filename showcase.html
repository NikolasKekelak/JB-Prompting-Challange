<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#111; --ink:#f5f5f5; --muted:#c9c9c9; --shadow:0 12px 32px rgba(0,0,0,.45); }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;background:#000;color:var(--ink);font-family:'Oswald',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .frame-wrap{position:fixed;inset:0}
    iframe.site{position:absolute;inset:0;width:100%;height:100%;border:0}
    .timer{position:fixed;right:14px;top:14px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);
      border-radius:12px;padding:10px 12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;z-index:999999}
    .timer .label{opacity:.85;font-size:.9rem}
    .timer .count{font-weight:800;font-size:1.3rem;letter-spacing:.5px}
    .fallback{position:fixed;inset:0;display:grid;place-items:center;padding:24px;text-align:center}
    .fallback .card{background:#181818;border:1px solid rgba(255,255,255,.25);border-radius:16px;box-shadow:var(--shadow);padding:22px 20px;max-width:min(92vw,680px)}
  </style>
  <script src="config.js"></script>
  <script src="timer.js"></script>
  <script src="state.js"></script>
  <script src="showcase.js" defer></script>
</head>
<body>
  <div class="timer" role="status" aria-live="polite">
    <div class="label">Showcase</div>
    <div id="showcaseCountdown" class="count">--:--</div>
  </div>
  <div class="frame-wrap">
    <iframe id="siteFrame" class="site" src="about:blank" title="Showcase website"></iframe>
  </div>
  <div id="fallback" class="fallback" hidden>
    <div class="card">
      <div style="font-weight:800;font-size:1.2rem;margin-bottom:8px">No website specified</div>
      <div style="opacity:.9">The showcase will still run and then continue to the prompt phase.</div>
    </div>
  </div>
</body>
</html>
