<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gaming studio page — To be added</title>
  <style>
    :root{--bg:#0f0f10;--ink:#f5f5f5;--muted:#c9c9c9;--btn:#ffffff;--btnText:#000000}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .wrap{min-height:100dvh;display:grid;place-items:center;padding:24px}
    .card{background:#171717;border:1px solid rgba(255,255,255,.2);border-radius:14px;box-shadow:0 12px 32px rgba(0,0,0,.45);padding:22px;max-width:680px;text-align:center}
    h1{margin:0 0 10px 0;font-size:1.6rem}
    p{margin:0 0 16px 0;color:var(--muted)}
    .actions{display:flex;justify-content:center}
    .btn{appearance:none;border:none;background:var(--btn);color:var(--btnText);font-weight:700;padding:12px 16px;border-radius:10px;cursor:pointer;text-decoration:none}
    .btn:focus-visible{outline:3px solid #fff;outline-offset:2px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-labelledby="t">
      <h1 id="t">Gaming studio page</h1>
      <p>To be added.</p>
      <div class="actions">
        <a class="btn" href="../index.html">Back to Wheel</a>
      </div>
    </div>
  </div>
</body>
</html>
