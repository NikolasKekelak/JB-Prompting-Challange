<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#111; --ink:#f5f5f5; --muted:#c9c9c9; --shadow:0 12px 32px rgba(0,0,0,.45); }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Oswald',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .wrap{min-height:100dvh;display:grid;place-items:center;padding:24px}
    .card{background:#181818;border:1px solid rgba(255,255,255,.25);border-radius:16px;box-shadow:var(--shadow);padding:24px 22px;max-width:min(92vw,720px);text-align:center}
    .title{font-size:2rem;font-weight:800;margin:0 0 12px}
    .count{font-size:3rem;font-weight:800;letter-spacing:1px;margin:8px 0 16px}
    .desc{opacity:.85}
  </style>
  <script src="config.js"></script>
  <script src="timer.js"></script>
  <script src="state.js"></script>
  <script src="prompt.js" defer></script>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-live="polite">
      <div id="phaseTitle" class="title">Prepare yourself</div>
      <div id="promptCountdown" class="count">--:--</div>
      <div class="desc" id="phaseDesc">Get ready. The prompt will start automatically.</div>
    </div>
  </div>
</body>
</html>
