void mainImage( out vec4 fragColor, in vec2 fragCoord ) {
    // Normalized pixel coordinates (from -1 to 1)
    vec2 uv = fragCoord/iResolution.xy * 2. - 1.;
    uv.y *= -1.;

    // Output to screen
    fragColor = cppn_fn(uv, 0.1 * sin(0.3 * iTime), 0.1 * sin(0.69*iTime), 0.1 * sin(0.44 * iTime));
}

        }

  <div class="stage">
    <div class="dial" aria-label="Random selection wheel">
      <canvas id="wheel" aria-hidden="true"></canvas>
      <div class="pointer" aria-hidden="true"></div>
      <button id="spin" class="spin-btn" aria-live="polite" aria-label="Spin the wheel">
        <span class="txt">Spin</span>
      </button>

      <div id="resultOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="resultTitle" hidden>
        <div class="overlay-card">
          <div id="resultTitle" class="overlay-title">Selected</div>
          <div id="chosenName" class="overlay-name">—</div>
          <div class="overlay-actions">
            <button id="go" class="overlay-go" disabled>Go to Website</button>
            <button id="closeOverlay" class="overlay-close" aria-label="Close result">Close</button>
          </div>
        </div>
      </div>

      <p id="announcement" class="sr-only" role="status" aria-live="polite">Press Spin to choose a website at random.</p>
    </div>
  </div>

  <script src="wheel.js"></script>

  <script>
    (function(){
      const canvas = document.getElementById('shader-target');
      if(!canvas || !window.shaderWebBackground){ return; }

      const updateCanvasSize = (c, ctx) => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        c.width = w; c.height = h;
        if(ctx){
          ctx.width = w; ctx.height = h; ctx.cssWidth = w; ctx.cssHeight = h;
        }
      };

      shaderWebBackground.shade({
        canvas,
        onInit: (ctx) => {
          updateCanvasSize(canvas, ctx);
          window.addEventListener('resize', () => updateCanvasSize(canvas, ctx));
        },
        shaders: {
          bgImage: {
            uniforms: {
              iTime: (gl, loc) => gl.uniform1f(loc, performance.now() / 1000),
              iResolution: (gl, loc, ctx) => gl.uniform2f(loc, ctx.width, ctx.height)
            }
          }
        }
      });
    })();
  </script>
