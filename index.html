<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Random Website Wheel</title>
  <meta name="description" content="Spin to randomly open one of the websites." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="wheel.css" />
</head>
<body>
  <div class="stage">
    <div class="dial" aria-label="Random selection wheel">
      <canvas id="wheel" aria-hidden="true"></canvas>
      <div class="pointer" aria-hidden="true"></div>
      <button id="spin" class="spin-btn" aria-live="polite" aria-label="Spin the wheel">
        <span class="txt">Spin</span>
      </button>

      <div id="resultOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="resultTitle" hidden>
        <div class="overlay-card">
          <div id="resultTitle" class="overlay-title">Selected</div>
          <div id="chosenName" class="overlay-name">—</div>
          <div class="overlay-actions">
            <button id="go" class="overlay-go" disabled>Go to Website</button>
            <button id="closeOverlay" class="overlay-close" aria-label="Close result">Close</button>
          </div>
        </div>
      </div>

      <p id="announcement" class="sr-only" role="status" aria-live="polite">Press Spin to choose a website at random.</p>
    </div>
  </div>

  <script src="wheel.js"></script>
</body>
</html>
